name: Telegram News Digest

on:
  schedule:
    # 07:00 שעון ישראל = 05:00 UTC (בקיץ) / 04:00 UTC (בחורף)
    # משתמשים ב-05:00 UTC — מתאים לשעון קיץ (IDT = UTC+3)
    - cron: "0 4 * * *"   # 07:00 שעון חורף ישראל (IST = UTC+2)
    - cron: "0 5 * * *"   # 07:00 שעון קיץ ישראל  (IDT = UTC+3)
    - cron: "0 17 * * *"  # 19:00 / 20:00 — run both, script self-guards
    - cron: "0 18 * * *"
  workflow_dispatch:       # הפעלה ידנית לבדיקות

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # שחזור קובץ הזכרון מה-cache
      - name: Restore memory cache
        uses: actions/cache@v4
        with:
          path: seen_news.json
          key: seen-news-${{ github.run_id }}
          restore-keys: |
            seen-news-

      - name: Run digest
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MY_TELEGRAM_ID: ${{ secrets.MY_TELEGRAM_ID }}
        run: python digest.py

      # שמירת קובץ הזכרון בחזרה ל-cache
      - name: Save memory cache
        if: always()
        uses: actions/cache@v4
        with:
          path: seen_news.json
          key: seen-news-${{ github.run_id }}
